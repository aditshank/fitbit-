<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Food icon - fork and knife -->
  <g transform="translate(160, 140)" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fork -->
    <path d="M40 200 L40 60 Q40 20 60 20 Q80 20 80 60 L80 200"/>
    <path d="M20 200 L20 60 Q20 20 40 20"/>
    <path d="M60 200 L60 60"/>
    <!-- Knife -->
    <path d="M120 200 L120 100 Q140 80 152 60 Q164 40 152 20 L120 50"/>
  </g>
  <!-- Calorie circle indicator -->
  <circle cx="360" cy="360" r="70" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="12"/>
  <circle cx="360" cy="360" r="70" fill="none" stroke="white" stroke-width="12"
    stroke-dasharray="340" stroke-dashoffset="100" transform="rotate(-90 360 360)"/>
  <text x="360" y="372" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">C</text>
</svg>
